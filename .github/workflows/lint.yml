name: Checkout SDK Lint

on:
  push:
  pull_request:

jobs:
  lint:
    name: PHP Syntax Check (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Check PHP syntax
        run: find src/ tests/ -name "*.php" -print0 | xargs -0 -P$(nproc) -I{} php -l {}
